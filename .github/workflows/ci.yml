name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: make xcodeproj

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Test
        run: make test

      - name: Build
        run: make build
