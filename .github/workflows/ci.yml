name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          XCODEGEN_VERSION: "2.45.3"
          SWIFTFORMAT_VERSION: "0.60.1"
          SWIFTLINT_VERSION: "0.63.2"
        run: |
          # XcodeGen — pinned binary from GitHub releases
          curl -fsSL "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" \
            -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          sudo mv /tmp/xcodegen/xcodegen /usr/local/bin/xcodegen

          # SwiftFormat — pinned binary from GitHub releases
          curl -fsSL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat_macos.zip" \
            -o /tmp/swiftformat.zip
          unzip -q /tmp/swiftformat.zip -d /tmp/swiftformat
          sudo mv /tmp/swiftformat/swiftformat /usr/local/bin/swiftformat

          # SwiftLint — pinned binary from GitHub releases
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_macos.zip" \
            -o /tmp/swiftlint.zip
          unzip -q /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo mv /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint

      - name: Generate Xcode project
        run: make xcodeproj

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Test
        run: make test

      - name: Build
        run: make build
